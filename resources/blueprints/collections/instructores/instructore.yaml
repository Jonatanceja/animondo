title: Instructores
tabs:
  main:
    display: Principal
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Nombre
          -
            handle: profesion
            field:
              type: textarea
              display: Profesión
              instructions: 'Una línea por renglón (ej: Instructora / Zona Construcción y Stop Motion).'
          -
            handle: card_color_de
            field:
              type: text
              display: 'Card · color de (degradado)'
              instructions: 'Hex, ej: #AFFFEC'
              width: 25
          -
            handle: card_color_a
            field:
              type: text
              display: 'Card · color a (degradado)'
              instructions: 'Hex, ej: #0A6DB4'
              width: 25
          -
            handle: bio_color_de
            field:
              type: text
              display: 'Bio · color de (degradado)'
              instructions: 'Hex, ej: #89F0D8'
              width: 25
          -
            handle: bio_color_a
            field:
              type: text
              display: 'Bio · color a (degradado)'
              instructions: 'Hex, ej: #F5E554'
              width: 25
          -
            handle: instagram
            field:
              type: text
              display: 'Instagram (URL)'
              width: 33
          -
            handle: tiktok
            field:
              type: text
              display: 'TikTok (URL)'
              width: 33
          -
            handle: facebook
            field:
              type: text
              display: 'Facebook (URL)'
              width: 33
          -
            handle: biografia
            field:
              type: markdown
              display: Biografía
              localizable: true
          -
            handle: foto_de_instructor
            field:
              container: assets
              max_files: 1
              type: assets
              display: 'Foto de instructor'
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
          -
            handle: personajes_en_entradas
            field:
              collections:
                - personajes
              type: entries
              display: 'Personajes en entradas'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
