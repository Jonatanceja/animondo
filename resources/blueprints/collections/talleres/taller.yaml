title: 'Taller Verano'
tabs:
  main:
    display: Taller
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: 'Nombre del curso'
              validate:
                - required
          -
            handle: descripcion
            field:
              type: bard
              display: Descripción
              buttons:
                - bold
                - italic
                - underline
                - strike
                - unorderedlist
                - orderedlist
                - h2
                - h3
                - blockquote
              save_html: true
              width: 50
          -
            handle: personaje_en_descripcion
            field:
              type: entries
              display: 'Personaje en descripción'
              collections:
                - personajes
              max_items: 1
              width: 25
          -
            handle: personaje
            field:
              type: entries
              display: Personaje
              collections:
                - personajes
              max_items: 1
              width: 25
          -
            handle: mensaje_importante
            field:
              type: bard
              display: 'Mensaje importante'
              instructions: 'Mensaje destacado visible en la página del taller'
              buttons:
                - bold
                - italic
                - underline
                - strike
                - unorderedlist
                - orderedlist
                - h2
                - h3
                - blockquote
              save_html: true
          -
            handle: edad
            field:
              type: text
              display: Edad
              instructions: 'Ej: 6-8 años'
              width: 50
          -
            handle: dias
            field:
              type: checkboxes
              display: Días
              options:
                lunes: Lunes
                martes: Martes
                miercoles: Miércoles
                jueves: Jueves
                viernes: Viernes
                sabado: Sábado
                domingo: Domingo
              width: 50
          -
            handle: hora_inicio
            field:
              type: time
              display: 'Hora de inicio'
              width: 33
          -
            handle: hora_fin
            field:
              type: time
              display: 'Hora de fin'
              width: 33
          -
            handle: horario_extendido
            field:
              type: time
              display: 'Horario Extendido'
              width: 33
          -
            handle: fecha_inicio
            field:
              type: date
              display: 'Fecha de inicio'
              width: 50
          -
            handle: fecha_fin
            field:
              type: date
              display: 'Fecha de fin'
              width: 50
          -
            handle: precio
            field:
              type: text
              display: Precio
              instructions: 'Ej: $500 MXN'
              width: 50
          -
            handle: precio_transporte
            field:
              type: text
              display: 'Precio del transporte'
              instructions: 'Costo extra que se suma al taller si el cliente marca la casilla de transporte. Solo número, ej: 350'
              width: 50
          -
            handle: resumen
            field:
              type: replicator
              display: Talleres
              sets:
                main:
                  display: Principal
                  sets:
                    opcion:
                      display: Opción
                      fields:
                        -
                          handle: titulo
                          field:
                            type: text
                            display: Título
                        -
                          handle: fecha_de_inicio
                          field:
                            type: date
                            display: 'Fecha de inicio'
                            width: 50
                        -
                          handle: fecha_de_finalizacion
                          field:
                            type: date
                            display: 'Fecha de finalización'
                            width: 50
                        -
                          handle: descripcion
                          field:
                            type: text
                            display: Descripción
                        -
                          handle: enlace
                          field:
                            type: text
                            display: 'Enlace de pago (PayPal)'
                            instructions: 'Pega el enlace de pago de PayPal de esta semana.'
                        -
                          handle: impartido_por
                          field:
                            collections:
                              - instructores
                            max_items: 1
                            type: entries
                            display: 'Impartido por'
                        -
                          handle: personaje
                          field:
                            collections:
                              - personajes
                            max_items: 1
                            type: entries
                            display: Personaje
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: template
            field:
              type: hidden
              default: talleres/taller-verano
